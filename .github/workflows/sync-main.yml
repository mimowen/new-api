name: Sync on Upstream Release

# 触发条件：仅当上游仓库发布新版本时（排除 Pre-release）
on:
  release:
    types: [published] # 仅监听正式发布
  workflow_dispatch:   # 保留手动触发，方便测试或紧急同步

jobs:
  sync:
    # 关键：防止被下游仓库的 Release 事件误触发
    # 请将下面的 'owner/repo' 替换为上游仓库的实际地址（例如：vuejs/vue）
    if: ${{ github.event.repository.full_name == 'QuantumNous/new-api' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout THIS repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add Upstream Remote
        # 使用 Secrets 中配置的上游仓库地址
        run: |
          git remote add upstream ${{ secrets.UPSTREAM_REPO_URL }} || true
          git fetch --prune upstream

      - name: Verify Critical Files
        run: |
          if ! grep -q "workflows/ -diff -merge" .gitattributes; then
            echo "❌ CRITICAL ERROR: .gitattributes is corrupted!"
            exit 1
          fi
          echo "✅ .gitattributes validation passed"

      - name: Sync with Upstream (Safe Mode)
        run: |
          git checkout main
          # 同步时排除 workflows 目录和 .gitattributes 文件
          git reset --hard upstream/main -- . \
            ':(exclude).github/workflows' \
            ':(exclude).gitattributes'
          
          # 双重检查：确保 workflows 目录没有被恢复
          if [ -d ".github/workflows" ]; then
            echo "❌ CRITICAL ERROR: workflows directory was restored!"
            exit 1
          fi
          echo "✅ Sync completed: workflows directory remains deleted"

      - name: Push Changes
        run: |
          if ! git diff --quiet; then
            git push origin main --force
            echo "🔄 Sync pushed to origin/main"
          else
            echo "✅ No changes to sync"
          fi