<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Model Interceptor Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.container{max-width:1400px;margin:0 auto;padding:20px}

/* 全局导航栏 - 固定在顶部 */
.global-nav{position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:12px 24px;margin-bottom:20px;background:#1e293b;border-radius:12px;border:1px solid #334155}
.global-nav h1{font-size:18px;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.nav-tabs{display:flex;gap:4px}
.nav-tab{padding:8px 20px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#94a3b8;transition:all .2s}
.nav-tab:hover{background:#334155;color:#e2e8f0}
.nav-tab.active{background:#3b82f6;color:#fff}

/* 模块控制区 - 全局开关 */
.module-controls{display:flex;gap:12px;align-items:center}
.mode-switch{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.mode-intercept{background:#065f46;color:#6ee7b7}
.mode-passthrough{background:#7c2d12;color:#fdba74}

/* 统计区 */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.stat-card{background:#1e293b;border-radius:12px;padding:16px;border:1px solid #334155}
.stat-card .label{font-size:11px;color:#94a3b8;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.stat-card .value{font-size:24px;font-weight:700}
.stat-card .value.green{color:#6ee7b7}
.stat-card .value.blue{color:#60a5fa}
.stat-card .value.yellow{color:#fbbf24}
.stat-card .value.red{color:#f87171}

/* 配置信息区 */
.config-section{background:#1e293b;border-radius:12px;padding:16px 20px;margin-bottom:16px;border:1px solid #334155}
.config-section h3{font-size:14px;margin-bottom:10px;color:#e2e8f0}
.config-row{display:flex;gap:20px;flex-wrap:wrap}
.config-item{flex:1;min-width:120px}
.config-item label{display:block;font-size:11px;color:#94a3b8;margin-bottom:3px}
.config-item span{font-size:13px;color:#e2e8f0;font-weight:500}

/* 操作工具栏 - 模块功能按钮 */
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.toolbar-left{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:#3b82f6;color:#fff}.btn-primary:hover{background:#2563eb}
.btn-success{background:#059669;color:#fff}.btn-success:hover{background:#047857}
.btn-danger{background:#dc2626;color:#fff}.btn-danger:hover{background:#b91c1c}
.btn-secondary{background:#334155;color:#e2e8f0}.btn-secondary:hover{background:#475569}
.btn-warning{background:#d97706;color:#fff}.btn-warning:hover{background:#b45309}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-icon{padding:6px 10px}

/* 状态信息 */
.status-bar{font-size:11px;color:#64748b;display:flex;align-items:center;gap:8px}
.status-dot{width:6px;height:6px;border-radius:50%;background:#6ee7b7;display:inline-block}
.status-dot.paused{background:#fbbf24}

/* 分类面板 */
.category-panel{background:#1e293b;border-radius:12px;margin-bottom:16px;border:1px solid #334155;overflow:hidden}
.category-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:#1e293b;border-bottom:1px solid #334155}
.category-header h3{font-size:14px;color:#e2e8f0}
.category-header .patterns{font-size:11px;color:#94a3b8;margin-top:3px}
.category-actions{display:flex;gap:6px}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 14px;font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #334155;background:#1e293b}
td{padding:8px 14px;border-bottom:1px solid #1e293b;font-size:12px}
tr:hover td{background:#334155}
.score-bar{width:80px;height:5px;background:#334155;border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:6px}
.score-bar-fill{height:100%;border-radius:3px;transition:width .3s}

/* 模态框 */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:flex;justify-content:center;align-items:center;z-index:1000}
.modal{background:#1e293b;border-radius:12px;padding:20px;width:400px;border:1px solid #334155}
.modal h3{margin-bottom:14px;font-size:15px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:11px;color:#94a3b8;margin-bottom:5px}
.form-group input,.form-group select{width:100%;padding:7px 10px;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:12px}
.form-group input:focus{outline:none;border-color:#3b82f6}
.modal-actions{display:flex;justify-content:flex-end;gap:6px;margin-top:16px}

.empty-state{text-align:center;padding:40px;color:#64748b}
</style>
</head>
<body>
<div class="container">
<!-- 全局导航栏 - 模块切换和全局开关 -->
<div class="global-nav">
  <h1>Model Interceptor</h1>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="location.href='/api/model_rank'">Rank Monitor</button>
    <button class="nav-tab" onclick="location.href='/api/model_rank/capture'">Request Capture</button>
  </div>
  <div class="module-controls">
    <button id="modeBtn" class="mode-switch mode-intercept" onclick="toggleMode()">INTERCEPT</button>
  </div>
</div>

<!-- 统计区 -->
<div class="stats-grid">
  <div class="stat-card"><div class="label">Categories</div><div class="value blue" id="statCategories">0</div></div>
  <div class="stat-card"><div class="label">Total Models</div><div class="value blue" id="statModels">0</div></div>
  <div class="stat-card"><div class="label">Successes</div><div class="value green" id="statSuccesses">0</div></div>
  <div class="stat-card"><div class="label">Failures</div><div class="value red" id="statFailures">0</div></div>
</div>

<!-- 配置信息区 -->
<div class="config-section">
  <h3>Score Configuration</h3>
  <div class="config-row">
    <div class="config-item"><label>Initial Score</label><span id="cfgInitial">-</span></div>
    <div class="config-item"><label>Success Bonus</label><span id="cfgBonus">-</span></div>
    <div class="config-item"><label>Failure Penalty</label><span id="cfgPenalty">-</span></div>
    <div class="config-item"><label>Mode</label><span id="cfgMode">-</span></div>
  </div>
</div>

<!-- 操作工具栏 - 模块功能按钮 -->
<div class="toolbar">
  <div class="toolbar-left">
    <button class="btn btn-primary" onclick="showAddCategoryModal()">+ Add Category</button>
    <button class="btn btn-success" onclick="saveConfig()">Save Config</button>
    <button class="btn btn-warning" onclick="reloadConfig()">Reload from File</button>
    <button class="btn btn-secondary btn-icon" onclick="refreshData()" title="手动刷新">⟳</button>
  </div>
  <div class="status-bar">
    <span class="status-dot" id="autoRefreshDot"></span>
    <span>Auto: 3s | Last: <span id="lastRefresh">-</span></span>
  </div>
</div>

<!-- 分类列表 -->
<div id="categoriesContainer"></div>
</div>

<div id="modalContainer"></div>

<script>
let lastData=null;
let interceptorEnabled=true;
let captureEnabled=false;
let autoRefreshTimer=null;

// 初始化
fetchStatus();
fetchMode();
startAutoRefresh();

// 自动刷新 - 3秒间隔
function startAutoRefresh(){
  stopAutoRefresh();
  autoRefreshTimer=setInterval(()=>{fetchStatus()},3000);
}

function stopAutoRefresh(){
  if(autoRefreshTimer){clearInterval(autoRefreshTimer);autoRefreshTimer=null}
}

// 获取状态
async function fetchStatus(){
  try{
    const r=await fetch('/api/model_rank/status');
    const j=await r.json();
    if(j.success){
      lastData=j.data;
      if(j.config){
        interceptorEnabled=j.config.enabled;
        updateModeButton();
        document.getElementById('cfgInitial').textContent=j.config.score_config.initial_score||'-';
        document.getElementById('cfgBonus').textContent='+'+j.config.score_config.success_bonus||'-';
        document.getElementById('cfgPenalty').textContent='-'+j.config.score_config.failure_penalty||'-';
        document.getElementById('cfgMode').textContent=interceptorEnabled?'Intercept':'Passthrough';
      }
      renderData(j.data);
    }
  }catch(e){console.error(e)}
  document.getElementById('lastRefresh').textContent=new Date().toLocaleTimeString();
}

async function fetchMode(){
  try{
    const r=await fetch('/api/model_rank/mode');
    const j=await r.json();
    if(j.success){
      interceptorEnabled=j.data.intercept_enabled;
      captureEnabled=j.data.capture_enabled;
      updateModeButton();
    }
  }catch(e){console.error(e)}
}

function updateModeButton(){
  const btn=document.getElementById('modeBtn');
  if(interceptorEnabled){
    btn.textContent='INTERCEPT';
    btn.className='mode-switch mode-intercept';
  }else{
    btn.textContent='PASSTHROUGH';
    btn.className='mode-switch mode-passthrough';
  }
  document.getElementById('cfgMode').textContent=interceptorEnabled?'Intercept':'Passthrough';
}

async function toggleMode(){
  try{
    const r=await fetch('/api/model_rank/mode',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({intercept_enabled:!interceptorEnabled})});
    const j=await r.json();
    if(j.success){
      interceptorEnabled=j.data.intercept_enabled;
      updateModeButton();
    }
  }catch(e){console.error(e)}
}

// 渲染数据（增量更新，不影响页面交互状态）
function renderData(data){
  let totalModels=0,totalS=0,totalF=0;
  const categories=Object.values(data);
  categories.forEach(c=>{totalModels+=c.models.length;c.models.forEach(m=>{totalS+=m.successes;totalF+=m.failures})});
  document.getElementById('statCategories').textContent=categories.length;
  document.getElementById('statModels').textContent=totalModels;
  document.getElementById('statSuccesses').textContent=totalS;
  document.getElementById('statFailures').textContent=totalF;

  const container=document.getElementById('categoriesContainer');
  const oldHtml=container.innerHTML;
  let newHtml='';
  
  categories.forEach(cat=>{
    const maxScore=Math.max(...cat.models.map(m=>m.score),1);
    newHtml+=`<div class="category-panel">
      <div class="category-header">
        <div><h3>${cat.category}</h3><div class="patterns">Patterns: ${cat.patterns.join(', ')||'none'}</div></div>
        <div class="category-actions">
          <button class="btn btn-primary btn-sm" onclick="showAddModelModal('${cat.category}')">+ Model</button>
          <button class="btn btn-danger btn-sm" onclick="removeCategory('${cat.category}')">Delete</button>
        </div>
      </div>
      <table><thead><tr><th>#</th><th>Model</th><th>Score</th><th>Success</th><th>Fail</th><th>Rate</th><th>Action</th></tr></thead><tbody>`;
    cat.models.forEach((m,i)=>{
      const pct=maxScore>0?(m.score/maxScore*100):0;
      const rate=m.successes+m.failures>0?Math.round(m.successes/(m.successes+m.failures)*100):0;
      const barColor=rate>=80?'#6ee7b7':rate>=50?'#fbbf24':'#f87171';
      newHtml+=`<tr><td>${i+1}</td><td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${m.model}">${m.model}</td>
        <td><div class="score-bar"><div class="score-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>${Math.round(m.score)}</td>
        <td style="color:#6ee7b7">${m.successes}</td><td style="color:#f87171">${m.failures}</td><td>${rate}%</td>
        <td><button class="btn btn-danger btn-sm" onclick="removeModel('${cat.category}','${m.model}')">Remove</button></td></tr>`;
    });
    if(cat.models.length===0)newHtml+=`<tr><td colspan="7" style="text-align:center;color:#64748b;padding:20px">No models</td></tr>`;
    newHtml+=`</tbody></table></div>`;
  });

  // 只在内容真正变化时更新（避免影响交互状态）
  if(oldHtml!==newHtml){
    container.innerHTML=newHtml;
  }
}

// 模态框
function showAddCategoryModal(){
  document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal"><h3>Add Category</h3>
    <div class="form-group"><label>Category Name</label><input id="addCatName" placeholder="e.g. high_tier"></div>
    <div class="form-group"><label>Patterns (comma separated)</label><input id="addCatPatterns" placeholder="e.g. gpt-4,claude-3"></div>
    <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="addCategory()">Add</button></div></div></div>`;
}

function showAddModelModal(category){
  document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal"><h3>Add Model to ${category}</h3>
    <div class="form-group"><label>Model Name</label><input id="addModelName" placeholder="e.g. gpt-4o"></div>
    <div class="form-group"><label>Weight</label><input id="addModelWeight" type="number" value="1" min="1"></div>
    <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="addModel('${category}')">Add</button></div></div></div>`;
}

function closeModal(){document.getElementById('modalContainer').innerHTML=''}

// 操作函数
async function addCategory(){
  const name=document.getElementById('addCatName').value.trim();
  const patterns=document.getElementById('addCatPatterns').value.split(',').map(s=>s.trim()).filter(s=>s);
  if(!name){alert('Category name required');return}
  try{
    const r=await fetch('/api/model_rank/category/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({category:name,patterns:patterns})});
    const j=await r.json();
    if(j.success){closeModal();fetchStatus()}else{alert(j.message)}
  }catch(e){alert('Error: '+e)}
}

async function removeCategory(category){
  if(!confirm('Delete category "'+category+'"?'))return;
  try{
    const r=await fetch('/api/model_rank/category/remove',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({category:category})});
    const j=await r.json();
    if(j.success)fetchStatus();else alert(j.message);
  }catch(e){alert('Error: '+e)}
}

async function addModel(category){
  const name=document.getElementById('addModelName').value.trim();
  const weight=parseInt(document.getElementById('addModelWeight').value)||1;
  if(!name){alert('Model name required');return}
  try{
    const r=await fetch('/api/model_rank/model/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({category:category,model:name,weight:weight})});
    const j=await r.json();
    if(j.success){closeModal();fetchStatus()}else{alert(j.message)}
  }catch(e){alert('Error: '+e)}
}

async function removeModel(category,model){
  if(!confirm('Remove model "'+model+'"?'))return;
  try{
    const r=await fetch('/api/model_rank/model/remove',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({category:category,model:model})});
    const j=await r.json();
    if(j.success)fetchStatus();else alert(j.message);
  }catch(e){alert('Error: '+e)}
}

async function saveConfig(){
  try{
    const r=await fetch('/api/model_rank/config/save',{method:'POST'});
    const j=await r.json();
    alert(j.success?'Config saved!':'Error: '+j.message);
  }catch(e){alert('Error: '+e)}
}

async function reloadConfig(){
  if(!confirm('Reload config from file?'))return;
  try{
    const r=await fetch('/api/model_rank/config/reload',{method:'POST'});
    const j=await r.json();
    if(j.success)fetchStatus();else alert(j.message);
  }catch(e){alert('Error: '+e)}
}

function refreshData(){fetchStatus();fetchMode()}
</script>
</body>
</html>
