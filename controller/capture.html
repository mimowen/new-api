<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Capture</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.container{max-width:1400px;margin:0 auto;padding:20px}

/* 全局导航栏 */
.global-nav{position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:12px 24px;margin-bottom:20px;background:#1e293b;border-radius:12px;border:1px solid #334155}
.global-nav h1{font-size:18px;background:linear-gradient(135deg,#f472b6,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.nav-tabs{display:flex;gap:4px}
.nav-tab{padding:8px 20px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#94a3b8;transition:all .2s}
.nav-tab:hover{background:#334155;color:#e2e8f0}
.nav-tab.active{background:#3b82f6;color:#fff}

/* 模块控制区 */
.module-controls{display:flex;gap:12px;align-items:center}
.toggle-btn{padding:6px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #475569;transition:all .2s}
.toggle-on{background:#065f46;color:#6ee7b7;border-color:#065f46}
.toggle-off{background:#1e293b;color:#94a3b8;border-color:#475569}

/* 操作工具栏 */
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.toolbar-left{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:#3b82f6;color:#fff}.btn-primary:hover{background:#2563eb}
.btn-danger{background:#dc2626;color:#fff}.btn-danger:hover{background:#b91c1c}
.btn-secondary{background:#334155;color:#e2e8f0}.btn-secondary:hover{background:#475569}
.btn-sm{padding:4px 10px;font-size:11px}
.filter-input{padding:7px 12px;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:12px;width:200px}
.filter-input:focus{outline:none;border-color:#3b82f6}

/* 时间线记录 */
.timeline{position:relative}
.record-card{background:#1e293b;border-radius:12px;margin-bottom:12px;border:1px solid #334155;overflow:hidden;transition:all .3s ease-out}
@keyframes recordFadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.record-card.fade-in{animation:recordFadeIn .25s ease-out}
.record-card.selected{border-color:#3b82f6}
.record-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;cursor:pointer;border-bottom:1px solid #1e293b}
.record-header:hover{background:#334155}
.record-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.record-time{font-size:11px;color:#94a3b8;font-family:monospace}
.record-type{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase}
.type-request{background:#1e3a5f;color:#60a5fa}
.type-response{background:#064e3b;color:#6ee7b7}
.type-error{background:#7f1d1d;color:#f87171}
.record-model{font-size:12px;color:#e2e8f0}
.record-arrow{color:#64748b;font-size:11px}
.record-actions{display:flex;gap:6px;align-items:center}
.record-body{padding:16px;display:none;border-top:1px solid #334155}
.record-body.open{display:block}
.record-section{margin-bottom:12px}
.record-section h4{font-size:11px;color:#94a3b8;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.record-content{background:#0f172a;border-radius:8px;padding:12px;font-family:'Fira Code',monospace,Consolas;font-size:11px;max-height:400px;overflow:auto;white-space:pre-wrap;word-break:break-all;line-height:1.5;color:#cbd5e1}
.pagination{display:flex;justify-content:center;align-items:center;gap:12px;margin-top:20px}
.pagination span{font-size:12px;color:#94a3b8}
.empty-state{text-align:center;padding:60px;color:#64748b}
.empty-state h3{margin-bottom:8px}
.checkbox{width:14px;height:14px;accent-color:#3b82f6;cursor:pointer}
.status-text{font-size:11px;color:#64748b}
</style>
</head>
<body>
<div class="container">
<!-- 全局导航栏 -->
<div class="global-nav">
  <h1>Request Capture</h1>
  <div class="nav-tabs">
    <button class="nav-tab" onclick="location.href='/api/model_rank'">Rank Monitor</button>
    <button class="nav-tab active" onclick="location.href='/api/model_rank/capture'">Request Capture</button>
  </div>
  <div class="module-controls">
    <button class="toggle-btn toggle-off" id="captureBtn" onclick="toggleCapture()">CAPTURE OFF</button>
  </div>
</div>

<!-- 操作工具栏 -->
<div class="toolbar">
  <div class="toolbar-left">
    <input class="filter-input" id="modelFilter" placeholder="Filter by model name..." oninput="debounceFetch()">
    <button class="btn btn-secondary btn-sm" onclick="fetchRecords()">Search</button>
    <button class="btn btn-danger btn-sm" onclick="deleteSelected()">Delete Selected (<span id="selectedCount">0</span>)</button>
    <button class="btn btn-danger btn-sm" onclick="deleteAll()">Delete All</button>
  </div>
  <span class="status-text">Total: <span id="totalRecords">0</span> records</span>
</div>

<!-- 时间线记录列表 -->
<div class="timeline" id="recordsContainer">
  <div class="empty-state"><h3>No capture records</h3><p>Enable capture to start recording requests</p></div>
</div>

<!-- 分页 -->
<div class="pagination" id="pagination" style="display:none">
  <button class="btn btn-secondary btn-sm" onclick="prevPage()">Prev</button>
  <span id="pageInfo">Page 1</span>
  <button class="btn btn-secondary btn-sm" onclick="nextPage()">Next</button>
</div>
</div>

<script>
let records=[];
let total=0;
let offset=0;
let limit=20;
let selectedIds=new Set();
let expandedIds=new Set();
let captureOn=false;
let debounceTimer=null;
let pollTimer=null;
let polling=false;
let lastRecordCount=0;

// 初始化 - 不自动轮询
fetchMode();
fetchRecords();

// 获取模式状态
async function fetchMode(){
  try{
    const r=await fetch('/api/model_rank/mode');
    const j=await r.json();
    if(j.success){
      captureOn=j.data.capture_enabled;
      updateCaptureBtn();
    }
  }catch(e){console.error(e)}
}

function updateCaptureBtn(){
  const btn=document.getElementById('captureBtn');
  if(captureOn){btn.textContent='CAPTURE ON';btn.className='toggle-btn toggle-on';startPolling()}
  else{btn.textContent='CAPTURE OFF';btn.className='toggle-btn toggle-off';stopPolling()}
}

async function toggleCapture(){
  try{
    const r=await fetch('/api/model_rank/mode',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({capture_enabled:!captureOn})});
    const j=await r.json();
    if(j.success){captureOn=j.data.capture_enabled;updateCaptureBtn()}
  }catch(e){console.error(e)}
}

// 轮询新数据（从上方插入）
function startPolling(){
  stopPolling();
  polling=true;
  lastRecordCount=records.length;
  pollTimer=setInterval(pollNewRecords,3000);
}

function stopPolling(){
  polling=false;
  if(pollTimer){clearInterval(pollTimer);pollTimer=null}
}

async function pollNewRecords(){
  if(!polling)return;
  const filter=document.getElementById('modelFilter').value.trim();
  try{
    const r=await fetch(`/api/model_rank/capture/records?model=${encodeURIComponent(filter)}&limit=10&offset=0`);
    const j=await r.json();
    if(!j.success)return;

    const newRecords=j.data.records;
    total=j.data.total;

    if(newRecords.length===0)return;

    const existingIds=new Set(records.map(rec=>rec.id));
    const trulyNew=newRecords.filter(rec=>!existingIds.has(rec.id));
    if(trulyNew.length===0)return;

    records.unshift(...trulyNew);
    document.getElementById('totalRecords').textContent=total;
    appendRecords(trulyNew);
    lastRecordCount=records.length;
  }catch(e){console.error(e)}
}

function appendRecords(newRecords){
  const container=document.getElementById('recordsContainer');
  const emptyState=container.querySelector('.empty-state');
  if(emptyState)emptyState.remove();

  const frag=document.createDocumentFragment();
  newRecords.forEach(rec=>{
    const card=createRecordElement(rec);
    frag.appendChild(card);
  });

  const firstCard=container.querySelector('.record-card');
  if(firstCard){
    container.insertBefore(frag,firstCard);
  }else{
    container.appendChild(frag);
  }

  document.getElementById('totalRecords').textContent=total;
  updatePagination();
}

function createRecordElement(rec){
  const div=document.createElement('div');
  const isSelected=selectedIds.has(rec.id);
  const isExpanded=expandedIds.has(rec.id);
  const typeClass=rec.type==='response'?'type-response':rec.type==='error'?'type-error':'type-request';
  const ts=new Date(rec.timestamp).toLocaleString();

  div.className='record-card fade-in';
  div.dataset.id=rec.id;

  div.innerHTML=`
    <div class="record-header" onclick="toggleRecord('${rec.id}',this)">
      <div class="record-meta">
        <input type="checkbox" class="checkbox" ${isSelected?'checked':''} onclick="event.stopPropagation();toggleSelect('${rec.id}')">
        <span class="record-time">${ts}</span>
        <span class="record-type ${typeClass}">${rec.type}</span>
        <span class="record-model">${rec.original_model}</span>
        <span class="record-arrow">→</span>
        <span class="record-model">${rec.mapped_model}</span>
        <span style="font-size:10px;color:#64748b">[${rec.category}]</span>
      </div>
      <div class="record-actions">
        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteSingle('${rec.id}')">Delete</button>
      </div>
    </div>
    <div class="record-body ${isExpanded?'open':''}" id="body-${rec.id}">
      ${rec.request_body?`<div class="record-section"><h4>Request Body</h4><div class="record-content">${formatJSON(rec.request_body)}</div></div>`:''}
      ${rec.response_body?`<div class="record-section"><h4>Response Body</h4><div class="record-content">${formatJSON(rec.response_body)}</div></div>`:''}
    </div>`;

  return div;
}

async function fetchRecords(){
  const filter=document.getElementById('modelFilter').value.trim();
  try{
    const r=await fetch(`/api/model_rank/capture/records?model=${encodeURIComponent(filter)}&limit=${limit}&offset=${offset}`);
    const j=await r.json();
    if(j.success){
      records=j.data.records;
      total=j.data.total;
      document.getElementById('totalRecords').textContent=total;
      renderRecords();
      updatePagination();
    }
  }catch(e){console.error(e)}
}

function debounceFetch(){
  clearTimeout(debounceTimer);
  debounceTimer=setTimeout(()=>{offset=0;expandedIds.clear();fetchRecords()},300);
}

function renderRecords(){
  const container=document.getElementById('recordsContainer');
  if(records.length===0){
    container.innerHTML='<div class="empty-state"><h3>No capture records</h3><p>Enable capture to start recording requests</p></div>';
    return;
  }

  const existingCards=new Set(Array.from(container.querySelectorAll('.record-card')).map(el=>el.dataset.id));
  const recordsById=new Map(records.map(rec=>[rec.id,rec]));

  const recordsHtml=new Set();
  let html='';
  records.forEach(rec=>{
    const cardHtml=recordToHtml(rec);
    recordsHtml.add(rec.id);
    html+=cardHtml;
  });

  if(container.innerHTML!==`<div class="empty-state"><h3>No capture records</h3><p>Enable capture to start recording requests</p></div>`){
    const oldCards=new Set(Array.from(container.querySelectorAll('.record-card')).map(el=>el.dataset.id));
    let changed=false;
    if(oldCards.size!==recordsHtml.size)changed=true;
    else{for(const id of recordsHtml)if(!oldCards.has(id))changed=true}
    if(changed)container.innerHTML=html;
  }else{
    container.innerHTML=html;
  }
}

function recordToHtml(rec){
  const isSelected=selectedIds.has(rec.id);
  const isExpanded=expandedIds.has(rec.id);
  const typeClass=rec.type==='response'?'type-response':rec.type==='error'?'type-error':'type-request';
  const ts=new Date(rec.timestamp).toLocaleString();
  return`<div class="record-card ${isSelected?'selected':''}" data-id="${rec.id}">
    <div class="record-header" onclick="toggleRecord('${rec.id}',this)">
      <div class="record-meta">
        <input type="checkbox" class="checkbox" ${isSelected?'checked':''} onclick="event.stopPropagation();toggleSelect('${rec.id}')">
        <span class="record-time">${ts}</span>
        <span class="record-type ${typeClass}">${rec.type}</span>
        <span class="record-model">${rec.original_model}</span>
        <span class="record-arrow">→</span>
        <span class="record-model">${rec.mapped_model}</span>
        <span style="font-size:10px;color:#64748b">[${rec.category}]</span>
      </div>
      <div class="record-actions">
        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteSingle('${rec.id}')">Delete</button>
      </div>
    </div>
    <div class="record-body ${isExpanded?'open':''}" id="body-${rec.id}">
      ${rec.request_body?`<div class="record-section"><h4>Request Body</h4><div class="record-content">${formatJSON(rec.request_body)}</div></div>`:''}
      ${rec.response_body?`<div class="record-section"><h4>Response Body</h4><div class="record-content">${formatJSON(rec.response_body)}</div></div>`:''}
    </div>
  </div>`;
}

function formatJSON(str){
  try{
    const obj=JSON.parse(str);
    return syntaxHighlight(JSON.stringify(obj,null,2));
  }catch(e){
    return escapeHtml(str);
  }
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function syntaxHighlight(json){
  json=escapeHtml(json);
  return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,function(match){
    let cls='color:#fbbf24';
    if(/:$/.test(match))cls='color:#60a5fa';
    else if(/^"/.test(match))cls='color:#6ee7b7';
    else if(/true|false/.test(match))cls='color:#f472b6';
    else if(/null/.test(match))cls='color:#94a3b8';
    return '<span style="'+cls+'">'+match+'</span>';
  });
}

function toggleRecord(id,headerEl){
  if(expandedIds.has(id))expandedIds.delete(id);else expandedIds.add(id);
  const bodyEl=document.getElementById('body-'+id);
  if(bodyEl)bodyEl.classList.toggle('open');
}

function toggleSelect(id){
  if(selectedIds.has(id))selectedIds.delete(id);else selectedIds.add(id);
  document.getElementById('selectedCount').textContent=selectedIds.size;
  const card=document.querySelector(`.record-card[data-id="${id}"]`);
  if(card)card.classList.toggle('selected');
  const checkbox=card?.querySelector('.checkbox');
  if(checkbox)checkbox.checked=selectedIds.has(id);
}

async function deleteSingle(id){
  try{
    const r=await fetch('/api/model_rank/capture/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids:[id]})});
    const j=await r.json();
    if(j.success){
      selectedIds.delete(id);expandedIds.delete(id);
      const card=document.querySelector(`.record-card[data-id="${id}"]`);
      if(card)card.remove();
      records=records.filter(rec=>rec.id!==id);
      total--;
      document.getElementById('totalRecords').textContent=total;
      document.getElementById('selectedCount').textContent=selectedIds.size;
      if(records.length===0)fetchRecords();
    }
    else alert(j.message);
  }catch(e){alert('Error: '+e)}
}

async function deleteSelected(){
  if(selectedIds.size===0){alert('No records selected');return}
  if(!confirm('Delete '+selectedIds.size+' records?'))return;
  try{
    const r=await fetch('/api/model_rank/capture/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids:Array.from(selectedIds)})});
    const j=await r.json();
    if(j.success){
      selectedIds.forEach(id=>{expandedIds.delete(id);const card=document.querySelector(`.record-card[data-id="${id}"]`);if(card)card.remove()});
      records=records.filter(rec=>!selectedIds.has(rec.id));
      total=records.length;
      selectedIds.clear();
      document.getElementById('selectedCount').textContent=0;
      document.getElementById('totalRecords').textContent=total;
      if(records.length===0)fetchRecords();
    }
    else alert(j.message);
  }catch(e){alert('Error: '+e)}
}

async function deleteAll(){
  if(!confirm('Delete ALL capture records? This cannot be undone.'))return;
  try{
    const r=await fetch('/api/model_rank/capture/delete_all',{method:'POST'});
    const j=await r.json();
    if(j.success){
      selectedIds.clear();expandedIds.clear();records=[];total=0;
      document.getElementById('selectedCount').textContent=0;
      document.getElementById('totalRecords').textContent=0;
      fetchRecords();
    }
    else alert(j.message);
  }catch(e){alert('Error: '+e)}
}

function updatePagination(){
  const page=Math.floor(offset/limit)+1;
  const totalPages=Math.ceil(total/limit)||1;
  document.getElementById('pageInfo').textContent=`Page ${page} / ${totalPages}`;
  document.getElementById('pagination').style.display=totalPages>1?'flex':'none';
}

function prevPage(){if(offset>=limit){offset-=limit;expandedIds.clear();fetchRecords()}}
function nextPage(){if(offset+limit<total){offset+=limit;expandedIds.clear();fetchRecords()}}
</script>
</body>
</html>
